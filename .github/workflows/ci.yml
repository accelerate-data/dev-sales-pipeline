# Ephemeral Fabric CI
#
# Thin caller — all logic lives in accelerate-data/domain-cicd-workflows.
# Domain configuration: ci-config.yml in this repo root.
# Required secrets: set at GitHub org level (inherited automatically).

name: Ephemeral Fabric CI

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

jobs:
  ci:
    uses: accelerate-data/domain-cicd-workflows/.github/workflows/domain-ci.yml@main
    secrets: inherit
