# Orphaned Ephemeral Workspace Cleanup
#
# Runs daily to delete ephemeral-* Fabric workspaces whose PR has been
# closed or merged. Safety net for workspaces whose teardown job failed.

name: Orphaned Workspace Cleanup

on:
  schedule:
    - cron: "0 2 * * *"  # Daily at 2 AM UTC
  workflow_dispatch:      # Allow manual trigger

env:
  PYTHON_VERSION: "3.11"

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install requests --quiet

      - name: Delete orphaned ephemeral workspaces
        env:
          FABRIC_TENANT_ID: ${{ secrets.FABRIC_TENANT_ID }}
          FABRIC_CLIENT_ID: ${{ secrets.FABRIC_CLIENT_ID }}
          FABRIC_CLIENT_SECRET: ${{ secrets.FABRIC_CLIENT_SECRET }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 scripts/fabric_api.py cleanup --repo "$GITHUB_REPOSITORY"
